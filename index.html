<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penerimaan Surat - Setum Polri</title>
    
    <!-- CSS Bootstrap 5 untuk Desain UI/UX Modern -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Library Supabase, SheetJS (Excel), dan jsPDF (PDF) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-light">

    <!-- Header / Navbar Resmi -->
    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">📨 Sistem Penerimaan Surat - Setum Polri</span>
        </div>
    </nav>

    <div class="container mb-5">
        
        <!-- Formulir Input dalam Card yang Elegan -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary fw-bold">Formulir Penerimaan Surat</h5>
            </div>
            <div class="card-body">
                <input type="hidden" id="edit_id">

                <!-- BARIS 1: Jenis, Nomor, Tanggal -->
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="jenis_surat" class="form-label fw-bold">Jenis Surat:</label>
                        <select id="jenis_surat" class="form-select" required>
                            <option value="" disabled selected>-- Pilih Jenis Surat --</option>
                            <option value="Amanat">Amanat</option>
                            <option value="Berita Acara">Berita Acara</option>
                            <option value="Biasa">Biasa</option>
                            <option value="Instansi Luar">Instansi Luar</option>
                            <option value="Instruksi">Instruksi</option>
                            <option value="Keputusan">Keputusan</option>
                            <option value="Laporan">Laporan</option>
                            <option value="Maklumat">Maklumat</option>
                            <option value="Nota Dinas">Nota Dinas</option>
                            <option value="Notula">Notula</option>
                            <option value="Panggilan Personel">Panggilan Personel</option>
                            <option value="Pengaduan Masyarakat">Pengaduan Masyarakat</option>
                            <option value="Pengumuman">Pengumuman</option>
                            <option value="Peraturan">Peraturan</option>
                            <option value="Rahasia">Rahasia</option>
                            <option value="Ren Ops">Ren Ops</option>
                            <option value="Sandi">Sandi</option>
                            <option value="Sangat Rahasia">Sangat Rahasia</option>
                            <option value="Sipil">Sipil</option>
                            <option value="SOP">SOP</option>
                            <option value="Surat Cuti">Surat Cuti</option>
                            <option value="Surat Edaran">Surat Edaran</option>
                            <option value="Surat Izin">Surat Izin</option>
                            <option value="Surat Izin Jalan">Surat Izin Jalan</option>
                            <option value="Surat Keterangan">Surat Keterangan</option>
                            <option value="Surat Pemberitahuan">Surat Pemberitahuan</option>
                            <option value="Surat Pengantar">Surat Pengantar</option>
                            <option value="Surat Perintah">Surat Perintah</option>
                            <option value="Surat Perjalanan Dinas">Surat Perjalanan Dinas</option>
                            <option value="Surat Pernyataan">Surat Pernyataan</option>
                            <option value="Surat Persetujuan">Surat Persetujuan</option>
                            <option value="Surat Rekomendasi">Surat Rekomendasi</option>
                            <option value="Surat Takkah">Surat Takkah</option>
                            <option value="Surat Telegram">Surat Telegram</option>
                            <option value="Surat Telegram Rahasia">Surat Telegram Rahasia</option>
                            <option value="Surat Tugas">Surat Tugas</option>
                            <option value="Surat Undangan">Surat Undangan</option>
                            <option value="Telaahan Staf">Telaahan Staf</option>
                            <option value="Terbatas">Terbatas</option>
                            <option value="Undangan">Undangan</option>
                            <option value="Undangan Cetak">Undangan Cetak</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="nomor_surat" class="form-label fw-bold">Nomor Surat:</label>
                        <input type="text" id="nomor_surat" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="tanggal_diterima" class="form-label fw-bold">Tanggal Diterima:</label>
                        <input type="date" id="tanggal_diterima" class="form-control" required>
                    </div>
                </div>

                <!-- BARIS 2: Pengirim dan Tujuan -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="pengirim" class="form-label fw-bold">Pengirim:</label>
                        <input type="text" id="pengirim" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="tujuan" class="form-label fw-bold">Tujuan:</label>
                        <input type="text" id="tujuan" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="perihal" class="form-label fw-bold">Perihal:</label>
                    <input type="text" id="perihal" class="form-control" required>
                </div>

                <div class="d-flex gap-2">
                    <button id="btn_simpan" class="btn btn-primary" onclick="simpanSurat()">Simpan Data Surat</button>
                    <button id="btn_batal_edit" class="btn btn-secondary d-none" onclick="batalEdit()">Batal Edit</button>
                </div>
                
                <div id="pesan" class="mt-3 fw-bold"></div>
            </div>
        </div>

        <!-- Bagian Daftar & Laporan Surat -->
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0 text-primary fw-bold">Daftar & Laporan Surat Masuk</h5>
            </div>
            <div class="card-body">
                
                <!-- Panel Pencarian dan Tombol Ekspor -->
                <!-- BARU: Penambahan input rentang tanggal -->
                <div class="row g-2 mb-3 align-items-center">
                    <div class="col-md-3">
                        <input type="text" id="inputPencarian" class="form-control" placeholder="Cari teks..." onkeyup="tampilkanSurat()">
                    </div>
                    <div class="col-md-3">
                        <div class="input-group">
                            <span class="input-group-text bg-white">Dari</span>
                            <input type="date" id="filter_tanggal_mulai" class="form-control" onchange="tampilkanSurat()">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="input-group">
                            <span class="input-group-text bg-white">Sampai</span>
                            <input type="date" id="filter_tanggal_sampai" class="form-control" onchange="tampilkanSurat()">
                        </div>
                    </div>
                    <div class="col-md-3 text-md-end">
                        <button class="btn btn-success btn-sm me-1" onclick="unduhLaporanExcel()">📊 Unduh Excel</button>
                        <button class="btn btn-danger btn-sm" onclick="unduhLaporanPDF()">📑 Unduh PDF</button>
                    </div>
                </div>

                <!-- Tabel Data Responsif -->
                <div class="table-responsive">
                    <table class="table table-bordered table-striped table-hover align-middle">
                        <thead class="table-primary text-center">
                            <tr>
                                <th>No</th>
                                <th>Jenis Surat</th>
                                <th>Nomor Surat</th>
                                <th>Tanggal Diterima</th>
                                <th>Instansi Pengirim</th>
                                <th>Tujuan</th>
                                <th>Perihal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="body_tabel">
                            <!-- Data akan dimuat otomatis oleh JavaScript -->
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

    </div>

    <!-- Script Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- 1. KONEKSI SUPABASE ---
        const SUPABASE_URL = 'https://ttoavlqcwlvkykkmrlap.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b2F2bHFjd2x2a3lra21ybGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NjQ0MzAsImV4cCI6MjEwMDI0MDQzMH0.vGInPpN5mnG2nMS2HiZYdKvhmMOMIuus4M-qSAYlXOI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dataSuratTerakhir = [];

        // --- 2. FUNGSI MENYIMPAN / MEMPERBARUI SURAT ---
        async function simpanSurat() {
            const editId = document.getElementById('edit_id').value;
            const jenisSurat = document.getElementById('jenis_surat').value;
            const nomorSurat = document.getElementById('nomor_surat').value;
            const tanggalDiterima = document.getElementById('tanggal_diterima').value;
            const pengirimSurat = document.getElementById('pengirim').value;
            const tujuanSurat = document.getElementById('tujuan').value;
            const perihalSurat = document.getElementById('perihal').value;

            if(!jenisSurat || !nomorSurat || !tanggalDiterima || !pengirimSurat || !tujuanSurat || !perihalSurat) {
                alert("Mohon lengkapi semua data teks, termasuk memilih Jenis Surat!");
                return;
            }

            const pesanEl = document.getElementById('pesan');
            pesanEl.className = "mt-3 fw-bold text-primary";
            pesanEl.innerText = "Sedang menyimpan data...";

            let dataYangDisimpan = { 
                jenis_surat: jenisSurat,
                nomor_surat: nomorSurat, 
                tanggal_diterima: tanggalDiterima, 
                pengirim: pengirimSurat, 
                tujuan: tujuanSurat,
                perihal: perihalSurat
            };

            let dbError = null;

            if (editId) {
                const { error } = await supabaseClient
                    .from('surat_masuk')
                    .update(dataYangDisimpan)
                    .eq('id', editId);
                dbError = error;
            } else {
                const { error } = await supabaseClient
                    .from('surat_masuk')
                    .insert([dataYangDisimpan]);
                dbError = error;
            }

            if (dbError) {
                console.error("Ada masalah database:", dbError);
                pesanEl.className = "mt-3 fw-bold text-danger";
                pesanEl.innerText = "Gagal menyimpan data ke database!";
            } else {
                pesanEl.className = "mt-3 fw-bold text-success";
                pesanEl.innerText = editId ? "Data surat berhasil diperbarui!" : "Surat baru berhasil disimpan!";
                
                batalEdit();
                tampilkanSurat();
            }
        }

        // --- 3. FUNGSI MENAMPILKAN DAN MENCARI SURAT ---
        async function tampilkanSurat() {
            const keyword = document.getElementById('inputPencarian').value;
            const tanggalMulai = document.getElementById('filter_tanggal_mulai').value;
            const tanggalSampai = document.getElementById('filter_tanggal_sampai').value;

            let query = supabaseClient
                .from('surat_masuk')
                .select('*')
                .order('dibuat_pada', { ascending: false });

            // Filter teks
            if (keyword) {
                query = query.or(`nomor_surat.ilike.%${keyword}%,pengirim.ilike.%${keyword}%,tujuan.ilike.%${keyword}%,jenis_surat.ilike.%${keyword}%`);
            }

            // BARU: Filter Tanggal Mulai (Lebih besar atau sama dengan)
            if (tanggalMulai) {
                query = query.gte('tanggal_diterima', tanggalMulai);
            }

            // BARU: Filter Tanggal Sampai (Lebih kecil atau sama dengan)
            if (tanggalSampai) {
                query = query.lte('tanggal_diterima', tanggalSampai);
            }

            const { data, error } = await query;

            if (error) {
                console.error("Gagal mengambil data:", error);
                return;
            }

            dataSuratTerakhir = data;

            const tbody = document.getElementById('body_tabel');
            tbody.innerHTML = ''; 

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-3 text-muted">Tidak ada data surat yang ditemukan.</td></tr>`;
                return;
            }

            data.forEach((surat, index) => {
                const baris = `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td>${surat.jenis_surat || '-'}</td>
                        <td>${surat.nomor_surat}</td>
                        <td>${surat.tanggal_diterima || '-'}</td>
                        <td>${surat.pengirim}</td>
                        <td>${surat.tujuan || '-'}</td>
                        <td>${surat.perihal}</td>
                        <td class="text-center">
                            <button class="btn btn-warning btn-sm mb-1" onclick="editSurat('${surat.id}')">Edit</button>
                            <button class="btn btn-danger btn-sm mb-1" onclick="hapusSurat('${surat.id}')">Hapus</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += baris;
            });
        }

        // --- 4. FUNGSI MENGAMBIL DATA KE FORM UNTUK DI-EDIT ---
        function editSurat(idSurat) {
            const surat = dataSuratTerakhir.find(s => s.id === idSurat);
            
            if (surat) {
                document.getElementById('edit_id').value = surat.id;
                document.getElementById('jenis_surat').value = surat.jenis_surat || '';
                document.getElementById('nomor_surat').value = surat.nomor_surat;
                document.getElementById('tanggal_diterima').value = surat.tanggal_diterima || '';
                document.getElementById('pengirim').value = surat.pengirim;
                document.getElementById('tujuan').value = surat.tujuan || '';
                document.getElementById('perihal').value = surat.perihal;
                
                const btnSimpan = document.getElementById('btn_simpan');
                btnSimpan.innerText = "Perbarui Data Surat";
                btnSimpan.className = "btn btn-warning";
                
                document.getElementById('btn_batal_edit').classList.remove('d-none');
                document.getElementById('pesan').innerText = "";

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // --- 5. FUNGSI MEMBATALKAN MODE EDIT ---
        function batalEdit() {
            document.getElementById('edit_id').value = '';
            document.getElementById('jenis_surat').value = '';
            document.getElementById('nomor_surat').value = '';
            document.getElementById('tanggal_diterima').value = '';
            document.getElementById('pengirim').value = '';
            document.getElementById('tujuan').value = '';
            document.getElementById('perihal').value = '';

            const btnSimpan = document.getElementById('btn_simpan');
            btnSimpan.innerText = "Simpan Data Surat";
            btnSimpan.className = "btn btn-primary";

            document.getElementById('btn_batal_edit').classList.add('d-none');
        }

        // --- 6. FUNGSI MENGHAPUS SURAT ---
        async function hapusSurat(idSurat) {
            const konfirmasi = confirm("Apakah Anda yakin ingin menghapus data surat ini?");
            if (!konfirmasi) return;

            const { error } = await supabaseClient.from('surat_masuk').delete().eq('id', idSurat);

            if (error) {
                console.error("Gagal menghapus:", error);
                alert("Gagal menghapus data surat!");
            } else {
                alert("Surat berhasil dihapus!");
                tampilkanSurat();
            }
        }

        // --- 7. FUNGSI UNDUH EXCEL ---
        function unduhLaporanExcel() {
            if (dataSuratTerakhir.length === 0) { alert("Tidak ada data untuk diunduh!"); return; }
            const dataUntukExcel = dataSuratTerakhir.map((surat, index) => {
                return { 
                    "No": index + 1, 
                    "Jenis Surat": surat.jenis_surat,
                    "Nomor Surat": surat.nomor_surat, 
                    "Tanggal Diterima": surat.tanggal_diterima, 
                    "Instansi Pengirim": surat.pengirim, 
                    "Tujuan": surat.tujuan, 
                    "Perihal": surat.perihal 
                };
            });
            const worksheet = XLSX.utils.json_to_sheet(dataUntukExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan");
            XLSX.writeFile(workbook, "Laporan_Surat_Masuk.xlsx");
        }

        // --- 8. FUNGSI UNDUH PDF ---
        function unduhLaporanPDF() {
            if (dataSuratTerakhir.length === 0) { alert("Tidak ada data untuk diunduh!"); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); 
            doc.setFontSize(16);
            doc.text("Laporan Surat Masuk - Setum Polri", 14, 20);
            doc.setFontSize(11);
            doc.text("Dicetak pada: " + new Date().toLocaleDateString('id-ID'), 14, 28);

            const namaKolom = [['No', 'Jenis Surat', 'Nomor Surat', 'Tanggal Diterima', 'Instansi Pengirim', 'Tujuan', 'Perihal']];
            const barisData = dataSuratTerakhir.map((surat, index) => [ 
                index + 1, 
                surat.jenis_surat || '-',
                surat.nomor_surat, 
                surat.tanggal_diterima || '-', 
                surat.pengirim, 
                surat.tujuan || '-', 
                surat.perihal 
            ]);

            doc.autoTable({ startY: 35, head: namaKolom, body: barisData, theme: 'grid', headStyles: { fillColor: [0, 77, 153] } });
            doc.save("Laporan_Surat_Masuk.pdf");
        }

        // Jalankan saat halaman dibuka
        tampilkanSurat();
    </script>
</body>
</html>
