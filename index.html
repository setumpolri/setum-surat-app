<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penerimaan Surat - Setum Polri</title>
    
    <!-- Library Supabase, SheetJS (Excel), dan jsPDF (PDF) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="date"], input[type="file"] { width: 100%; padding: 8px; box-sizing: border-box; }
        
        button { padding: 10px 15px; background-color: #004d99; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #003366; }
        #btn_batal_edit { background-color: #757575; display: none; margin-left: 10px; }
        #btn_batal_edit:hover { background-color: #616161; }
        
        #pesan { margin-top: 15px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #004d99; color: white; }
        
        .btn-edit { background-color: #fbc02d; padding: 5px 10px; font-size: 12px; color: black; border: none; cursor: pointer; margin-right: 5px; }
        .btn-edit:hover { background-color: #f9a825; }
        .btn-hapus { background-color: #cc0000; padding: 5px 10px; font-size: 12px; color: white; border: none; cursor: pointer; margin-top: 5px; }
        .btn-hapus:hover { background-color: #990000; }
        .btn-download { background-color: #008000; padding: 5px 10px; font-size: 12px; color: white; text-decoration: none; display: inline-block; }
        .btn-download:hover { background-color: #006600; }
        
        .action-panel { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .action-panel input { flex: 1; padding: 8px; min-width: 200px; }
        .btn-excel { background-color: #2e7d32; }
        .btn-excel:hover { background-color: #1b5e20; }
        .btn-pdf { background-color: #d32f2f; }
        .btn-pdf:hover { background-color: #b71c1c; }
    </style>
</head>
<body>

    <h2>Formulir Penerimaan Surat</h2>
    
    <input type="hidden" id="edit_id">

    <div class="form-group">
        <label for="nomor_surat">Nomor Surat:</label>
        <input type="text" id="nomor_surat" required>
    </div>

    <div class="form-group">
        <label for="tanggal_surat">Tanggal Surat:</label>
        <input type="date" id="tanggal_surat" required>
    </div>

    <div class="form-group">
        <label for="pengirim">Instansi Pengirim:</label>
        <input type="text" id="pengirim" required>
    </div>

    <!-- BAGIAN BARU: Kolom Input Tujuan -->
    <div class="form-group">
        <label for="tujuan">Tujuan:</label>
        <input type="text" id="tujuan" required>
    </div>

    <div class="form-group">
        <label for="perihal">Perihal:</label>
        <input type="text" id="perihal" required>
    </div>

    <div class="form-group">
        <label for="file_surat">Scan File Surat (Format PDF):</label>
        <input type="file" id="file_surat" accept=".pdf">
        <small id="keterangan_file_edit" style="color: green; display: none;">*Biarkan kosong jika tidak ingin mengubah file PDF sebelumnya.</small>
    </div>

    <div>
        <button id="btn_simpan" onclick="simpanSurat()">Simpan Data Surat</button>
        <button id="btn_batal_edit" onclick="batalEdit()">Batal Edit</button>
    </div>
    
    <div id="pesan"></div>

    <hr style="margin-top: 30px; margin-bottom: 30px;">

    <h2>Daftar & Laporan Surat Masuk</h2>

    <div class="action-panel">
        <input type="text" id="inputPencarian" placeholder="Cari nomor surat atau pengirim..." onkeyup="tampilkanSurat()">
        <button class="btn-excel" onclick="unduhLaporanExcel()">Unduh Laporan (Excel)</button>
        <button class="btn-pdf" onclick="unduhLaporanPDF()">Unduh Laporan (PDF)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nomor Surat</th>
                <th>Tanggal</th>
                <th>Pengirim</th>
                <!-- BAGIAN BARU: Header Tabel Tujuan -->
                <th>Tujuan</th>
                <th>Perihal</th>
                <th>File PDF</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="body_tabel">
            <!-- Data akan muncul di sini otomatis -->
        </tbody>
    </table>

    <script>
        // --- 1. KONEKSI SUPABASE ---
        const SUPABASE_URL = 'https://ttoavlqcwlvkykkmrlap.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0b2F2bHFjd2x2a3lra21ybGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NjQ0MzAsImV4cCI6MjEwMDI0MDQzMH0.vGInPpN5mnG2nMS2HiZYdKvhmMOMIuus4M-qSAYlXOI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dataSuratTerakhir = [];

        // --- 2. FUNGSI MENYIMPAN / MEMPERBARUI SURAT ---
        async function simpanSurat() {
            const editId = document.getElementById('edit_id').value;
            const nomorSurat = document.getElementById('nomor_surat').value;
            const tanggalSurat = document.getElementById('tanggal_surat').value;
            const pengirimSurat = document.getElementById('pengirim').value;
            const tujuanSurat = document.getElementById('tujuan').value; // Mengambil nilai Tujuan
            const perihalSurat = document.getElementById('perihal').value;
            const inputFile = document.getElementById('file_surat');

            if(!nomorSurat || !tanggalSurat || !pengirimSurat || !tujuanSurat || !perihalSurat) {
                alert("Mohon isi semua data teks surat!");
                return;
            }

            document.getElementById('pesan').style.color = '#004d99';
            document.getElementById('pesan').innerText = "Sedang memproses dan menyimpan data...";

            let filePath = null;

            if (inputFile.files.length > 0) {
                const file = inputFile.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                filePath = `${fileName}`;

                const { error: uploadError } = await supabaseClient.storage
                    .from('berkas_surat')
                    .upload(filePath, file);

                if (uploadError) {
                    console.error("Gagal upload file:", uploadError);
                    alert("Gagal mengunggah file PDF!");
                    document.getElementById('pesan').innerText = "";
                    return;
                }
            }

            // Memasukkan data tujuan ke dalam paket data
            let dataYangDisimpan = { 
                nomor_surat: nomorSurat, 
                tanggal_surat: tanggalSurat, 
                pengirim: pengirimSurat, 
                tujuan: tujuanSurat,
                perihal: perihalSurat
            };

            if (filePath) {
                dataYangDisimpan.file_url = filePath;
            }

            let dbError = null;

            if (editId) {
                const { error } = await supabaseClient
                    .from('surat_masuk')
                    .update(dataYangDisimpan)
                    .eq('id', editId);
                dbError = error;
            } else {
                const { error } = await supabaseClient
                    .from('surat_masuk')
                    .insert([dataYangDisimpan]);
                dbError = error;
            }

            if (dbError) {
                console.error("Ada masalah database:", dbError);
                document.getElementById('pesan').style.color = 'red';
                document.getElementById('pesan').innerText = "Gagal menyimpan data ke database!";
            } else {
                document.getElementById('pesan').style.color = 'green';
                document.getElementById('pesan').innerText = editId ? "Data surat berhasil diperbarui!" : "Surat baru berhasil disimpan!";
                
                batalEdit();
                tampilkanSurat();
            }
        }

        // --- 3. FUNGSI MENAMPILKAN DAN MENCARI SURAT ---
        async function tampilkanSurat() {
            const keyword = document.getElementById('inputPencarian').value;

            let query = supabaseClient
                .from('surat_masuk')
                .select('*')
                .order('dibuat_pada', { ascending: false });

            // Memungkinkan pencarian berdasarkan Tujuan juga
            if (keyword) {
                query = query.or(`nomor_surat.ilike.%${keyword}%,pengirim.ilike.%${keyword}%,tujuan.ilike.%${keyword}%`);
            }

            const { data, error } = await query;

            if (error) {
                console.error("Gagal mengambil data:", error);
                return;
            }

            dataSuratTerakhir = data;

            const tbody = document.getElementById('body_tabel');
            tbody.innerHTML = ''; 

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center;">Tidak ada data surat yang ditemukan.</td></tr>`;
                return;
            }

            data.forEach((surat, index) => {
                let tombolFile = "Tidak ada file";
                if (surat.file_url) {
                    const { data: publicURLData } = supabaseClient.storage
                        .from('berkas_surat')
                        .getPublicUrl(surat.file_url);

                    tombolFile = `<a href="${publicURLData.publicUrl}" target="_blank" class="btn-download">Buka PDF</a>`;
                }

                // Menambahkan sel tabel (td) untuk Tujuan
                const baris = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${surat.nomor_surat}</td>
                        <td>${surat.tanggal_surat}</td>
                        <td>${surat.pengirim}</td>
                        <td>${surat.tujuan || '-'}</td>
                        <td>${surat.perihal}</td>
                        <td>${tombolFile}</td>
                        <td>
                            <button class="btn-edit" onclick="editSurat('${surat.id}')">Edit</button>
                            <button class="btn-hapus" onclick="hapusSurat('${surat.id}', '${surat.file_url || ''}')">Hapus</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += baris;
            });
        }

        // --- 4. FUNGSI MENGAMBIL DATA KE FORM UNTUK DI-EDIT ---
        function editSurat(idSurat) {
            const surat = dataSuratTerakhir.find(s => s.id === idSurat);
            
            if (surat) {
                document.getElementById('edit_id').value = surat.id;
                document.getElementById('nomor_surat').value = surat.nomor_surat;
                document.getElementById('tanggal_surat').value = surat.tanggal_surat;
                document.getElementById('pengirim').value = surat.pengirim;
                document.getElementById('tujuan').value = surat.tujuan || ''; // Mengisi nilai form Tujuan
                document.getElementById('perihal').value = surat.perihal;
                
                document.getElementById('btn_simpan').innerText = "Perbarui Data Surat";
                document.getElementById('btn_batal_edit').style.display = "inline-block";
                document.getElementById('keterangan_file_edit').style.display = "block";
                document.getElementById('pesan').innerText = "";

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // --- 5. FUNGSI MEMBATALKAN MODE EDIT ---
        function batalEdit() {
            document.getElementById('edit_id').value = '';
            document.getElementById('nomor_surat').value = '';
            document.getElementById('tanggal_surat').value = '';
            document.getElementById('pengirim').value = '';
            document.getElementById('tujuan').value = ''; // Mengosongkan form Tujuan
            document.getElementById('perihal').value = '';
            document.getElementById('file_surat').value = '';

            document.getElementById('btn_simpan').innerText = "Simpan Data Surat";
            document.getElementById('btn_batal_edit').style.display = "none";
            document.getElementById('keterangan_file_edit').style.display = "none";
        }

        // --- 6. FUNGSI MENGHAPUS SURAT ---
        async function hapusSurat(idSurat, fileUrl) {
            const konfirmasi = confirm("Apakah Anda yakin ingin menghapus data surat ini?");
            if (!konfirmasi) return;

            if (fileUrl) {
                await supabaseClient.storage.from('berkas_surat').remove([fileUrl]);
            }

            const { error } = await supabaseClient.from('surat_masuk').delete().eq('id', idSurat);

            if (error) {
                console.error("Gagal menghapus:", error);
                alert("Gagal menghapus data surat!");
            } else {
                alert("Surat berhasil dihapus!");
                tampilkanSurat();
            }
        }

        // --- 7. FUNGSI UNDUH EXCEL ---
        function unduhLaporanExcel() {
            if (dataSuratTerakhir.length === 0) { alert("Tidak ada data untuk diunduh!"); return; }
            const dataUntukExcel = dataSuratTerakhir.map((surat, index) => {
                return { 
                    "No": index + 1, 
                    "Nomor Surat": surat.nomor_surat, 
                    "Tanggal Surat": surat.tanggal_surat, 
                    "Instansi Pengirim": surat.pengirim, 
                    "Tujuan": surat.tujuan, // Ditambahkan ke Excel
                    "Perihal": surat.perihal 
                };
            });
            const worksheet = XLSX.utils.json_to_sheet(dataUntukExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan");
            XLSX.writeFile(workbook, "Laporan_Surat_Masuk.xlsx");
        }

        // --- 8. FUNGSI UNDUH PDF ---
        function unduhLaporanPDF() {
            if (dataSuratTerakhir.length === 0) { alert("Tidak ada data untuk diunduh!"); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); 
            doc.setFontSize(16);
            doc.text("Laporan Surat Masuk - Setum Polri", 14, 20);
            doc.setFontSize(11);
            doc.text("Dicetak pada: " + new Date().toLocaleDateString('id-ID'), 14, 28);

            // Menambahkan kolom Tujuan ke laporan PDF
            const namaKolom = [['No', 'Nomor Surat', 'Tanggal', 'Instansi Pengirim', 'Tujuan', 'Perihal']];
            const barisData = dataSuratTerakhir.map((surat, index) => [ 
                index + 1, 
                surat.nomor_surat, 
                surat.tanggal_surat, 
                surat.pengirim, 
                surat.tujuan || '-', 
                surat.perihal 
            ]);

            doc.autoTable({ startY: 35, head: namaKolom, body: barisData, theme: 'grid', headStyles: { fillColor: [0, 77, 153] } });
            doc.save("Laporan_Surat_Masuk.pdf");
        }

        // Jalankan saat halaman dibuka
        tampilkanSurat();
    </script>
</body>
</html>
